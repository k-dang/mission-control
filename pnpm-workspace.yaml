# Supply-chain hardening for pnpm installs. See https://pnpm.io/settings

# Wait 7 days (10080 minutes) before installing a freshly published version.
# Malware is often published and then caught & unpublished within hours, so a
# release-age delay keeps those versions from ever landing in our tree.
minimumReleaseAge: 10080

# Keep transitive deps coming from the registry only (no git:/file:/tarball
# URLs that bypass it). This is the recent-pnpm default; never set it to false.
blockExoticSubdeps: true

onlyBuiltDependencies:
  - esbuild
  - '@tailwindcss/oxide'

overrides:
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3

allowBuilds:
  '@clerk/shared': false
  bufferutil: true
  core-js: false
  esbuild: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true
  utf-8-validate: true
